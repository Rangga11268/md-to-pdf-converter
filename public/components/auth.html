<!-- Auth Container (Login / Register) -->
<div id="auth-container" class="auth-container" style="display: none;">
    <div class="auth-box">
        <div class="auth-header">
            <span class="auth-dot red"></span>
            <span class="auth-dot yellow"></span>
            <span class="auth-dot green"></span>
            <span class="auth-title" id="auth-box-title">AKUN PENGGUNA</span>
        </div>
        <div class="auth-tabs">
            <button id="btn-tab-login" class="auth-tab-btn active" type="button">MASUK</button>
            <button id="btn-tab-register" class="auth-tab-btn" type="button">DAFTAR</button>
        </div>
        <div class="auth-body">
            <!-- Login Form -->
            <form id="form-login" class="auth-form">
                <div class="form-group-auth">
                    <label for="login-email">EMAIL</label>
                    <input type="email" id="login-email" placeholder="nama@email.com" required />
                </div>
                <div class="form-group-auth">
                    <label for="login-password">KATA SANDI</label>
                    <input type="password" id="login-password" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary auth-submit-btn">MASUK SEKARANG</button>
            </form>

            <!-- Register Form (Hidden initially) -->
            <form id="form-register" class="auth-form" style="display: none;">
                <div class="form-group-auth">
                    <label for="register-name">NAMA LENGKAP</label>
                    <input type="text" id="register-name" placeholder="John Doe" required />
                </div>
                <div class="form-group-auth">
                    <label for="register-email">EMAIL</label>
                    <input type="email" id="register-email" placeholder="nama@email.com" required />
                </div>
                <div class="form-group-auth">
                    <label for="register-password">KATA SANDI</label>
                    <input type="password" id="register-password" placeholder="Minimal 6 karakter" required />
                </div>
                <button type="submit" class="btn btn-blue auth-submit-btn">BUAT AKUN BARU</button>
            </form>
        </div>
        <div class="auth-footer">
            <p id="auth-switch-text">Belum punya akun? <span id="auth-toggle-link" class="auth-link">Daftar sekarang</span></p>
        </div>
    </div>
</div>
