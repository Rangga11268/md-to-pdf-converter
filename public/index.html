<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD2CV — AI-Powered Markdown to ATS CV Converter & Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Load marked CDN for frontend live rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <!-- Floating Sun & Cloud in Header -->
            <div class="header-sun">
                <svg viewBox="0 0 100 100" width="60" height="60">
                    <line x1="50" y1="12" x2="50" y2="2" stroke="#000" stroke-width="4.5" stroke-linecap="round" />
                    <line x1="50" y1="88" x2="50" y2="98" stroke="#000" stroke-width="4.5" stroke-linecap="round" />
                    <line x1="12" y1="50" x2="2" y2="50" stroke="#000" stroke-width="4.5" stroke-linecap="round" />
                    <line x1="88" y1="50" x2="98" y2="50" stroke="#000" stroke-width="4.5" stroke-linecap="round" />
                    <line x1="23" y1="23" x2="16" y2="16" stroke="#000" stroke-width="4.5" stroke-linecap="round" />
                    <line x1="77" y1="77" x2="84" y2="84" stroke="#000" stroke-width="4.5" stroke-linecap="round" />
                    <line x1="23" y1="77" x2="16" y2="84" stroke="#000" stroke-width="4.5" stroke-linecap="round" />
                    <line x1="77" y1="23" x2="84" y2="16" stroke="#000" stroke-width="4.5" stroke-linecap="round" />
                    <circle cx="50" cy="50" r="20" fill="#ffde4d" stroke="#000" stroke-width="4.5" />
                </svg>
            </div>
            <div class="header-cloud">
                <svg viewBox="0 0 120 70" width="70" height="40" fill="#ffffff" stroke="#000000" stroke-width="3">
                    <path d="M 25,50 a 15,15 0 0,1 0,-25 a 20,20 0 0,1 35,-15 a 20,20 0 0,1 30,15 a 15,15 0 0,1 5,25 z" />
                </svg>
            </div>

            <div class="logo-container">
                <div class="logo-wrapper">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <div class="logo-box">MD2CV</div>
                </div>
                <div class="tagline">AI-POWERED MARKDOWN TO ATS CV CONVERTER & OPTIMIZER</div>
            </div>
            <p class="subtitle">Ubah Markdown Anda menjadi CV ATS instan secara instan, dan optimalkan skor kelulusan CV Anda menggunakan AI Reviewer berstandar HRD secara langsung.</p>
        </div>
    </header>
 
     <main class="app-container">
         <!-- Editor & Preview Panel -->
         <section class="panel editor-panel">
             <div class="panel-header">
                 <div class="tabs-container">
                     <button id="tab-home" class="tab-btn active">BERANDA</button>
                     <button id="tab-editor" class="tab-btn">EDITOR</button>
                     <button id="tab-preview" class="tab-btn">PRATINJAU LANGSUNG</button>
                     <button id="tab-ai-reviewer" class="tab-btn">AI REVIEWER</button>
                     <button id="tab-pricing" class="tab-btn">PRICING</button>
                 </div>
                 <div class="actions">
                     <select id="select-template" class="btn btn-secondary select-template-btn">
                         <option value="" disabled selected>MUAT TEMPLATE</option>
                         <option value="cv">Template CV</option>
                         <option value="letter">Template Surat Lamaran</option>
                     </select>
                     <button id="btn-clear" class="btn btn-secondary" title="Kosongkan Editor">
                         <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                             <polyline points="3 6 5 6 21 6"></polyline>
                             <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                         </svg>
                         <span>BERSIHKAN</span>
                     </button>
                     <button id="btn-download-md" class="btn btn-blue" title="Unduh File .md">
                         <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                             <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                             <polyline points="7 10 12 15 17 10"></polyline>
                             <line x1="12" y1="15" x2="12" y2="3"></line>
                         </svg>
                         <span>UNDUH .MD</span>
                     </button>
                     <label for="file-upload" class="btn btn-primary file-label">
                         <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                             <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                             <polyline points="17 8 12 3 7 8"></polyline>
                             <line x1="12" y1="3" x2="12" y2="15"></line>
                         </svg>
                         <span>PILIH FILE .MD</span>
                         <input type="file" id="file-upload" accept=".md" />
                     </label>
                 </div>
             </div>
            
             <!-- Landing Page Beranda Placeholder -->
             <div id="home-placeholder"></div>
            
            <!-- Editor Placeholder -->
            <div id="editor-placeholder"></div>

            <!-- Live Preview Placeholder -->
            <div id="preview-placeholder"></div>

            <!-- AI Reviewer Placeholder -->
            <div id="reviewer-placeholder"></div>

            <!-- Pricing Placeholder -->
            <div id="pricing-placeholder"></div>
        </section>

        <!-- Settings Section -->
        <section class="panel settings-panel" id="settings-placeholder" style="display: none;"></section>
    </main>

    <footer class="app-footer">
        <!-- Cloud Divider on top -->
        <div class="footer-clouds-divider">
            <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
                <path d="M0,80 L0,50 Q30,20 80,35 Q140,5 210,25 Q270,-10 350,20 Q420,-15 500,15 Q570,-15 650,20 Q730,-10 810,20 Q890,-20 970,15 Q1040,-10 1120,20 Q1190,-20 1270,20 Q1340,5 1440,35 L1440,80 Z" fill="#3b82f6" stroke="#000000" stroke-width="4"></path>
            </svg>
        </div>
        
        <!-- Floating Clouds -->
        <div class="footer-cloud bg-cloud-1">
            <svg viewBox="0 0 120 70" width="70" height="40" fill="#ffffff" stroke="#000000" stroke-width="3">
                <path d="M 25,50 a 15,15 0 0,1 0,-25 a 20,20 0 0,1 35,-15 a 20,20 0 0,1 30,15 a 15,15 0 0,1 5,25 z" />
            </svg>
        </div>
        <div class="footer-cloud bg-cloud-2">
            <svg viewBox="0 0 120 70" width="90" height="50" fill="#ffffff" stroke="#000000" stroke-width="3">
                <path d="M 25,50 a 15,15 0 0,1 0,-25 a 20,20 0 0,1 35,-15 a 20,20 0 0,1 30,15 a 15,15 0 0,1 5,25 z" />
            </svg>
        </div>
        
        <div class="footer-content">
            <p>Darell Rangga Putra Rachman — darellrangga@gmail.com | +62 8978638973 | darellrangga.me</p>
        </div>
    </footer>

    <!-- Dialogs Placeholder -->
    <div id="dialogs-placeholder"></div>

    <script src="js/app.js"></script>
</body>
</html>
